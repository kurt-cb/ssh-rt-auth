[pytest]
testpaths = tests
addopts =
    -ra --strict-markers
markers =
    lxc: end-to-end tests that require LXC containers (slow, optional)
    loopback: 3-process loopback integration tests on 127.0.0.1/.2/.3
    setup_only: opt-in ad-hoc LXC lab provisioner — debug_sshd flavor (no teardown)
    setup_only_msshd: opt-in ad-hoc LXC lab provisioner — Tier-1 msshd journey (no teardown)
    openssh_shim: opt-in LXC test for the AKC shim against stock OpenSSH
    openssh_patches: opt-in LXC test for the two upstream-targeted OpenSSH patches (0002 + 0003)
    wrapper_enforce: opt-in LXC test for the Tier 1 wrapper in enforce mode (end-to-end mssh → CA → inner sshd)
filterwarnings =
    ignore::DeprecationWarning
